# pubspec.yaml — Bravo Maps dependency manifest.
# Defines all packages, assets, and fonts. Every dependency below is chosen to
# honor the privacy constraints in PRODUCT_BRIEF.md (no Google/Meta/ad SDKs).

name: bravo_maps
description: Privacy-first navigation app with offline maps, ALPR avoidance, and personality-driven cartoon avatars.
publish_to: "none" # Not a pub.dev package; this is an application.
version: 0.2.0+2   # Phase 2 bump.

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- STATE MANAGEMENT ---
  flutter_riverpod: ^2.6.1

  # --- MAPS ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- LOCATION ---
  geolocator: ^13.0.2

  # --- BACKEND ---
  supabase_flutter: ^2.8.0

  # --- LOCAL STORAGE ---
  # Hive CE: chosen over Isar (see README). Used for tile metadata + settings.
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.2.0

  # --- CONNECTIVITY ---
  connectivity_plus: ^6.1.0

  # --- FILESYSTEM ---
  path_provider: ^2.1.4

  # --- NETWORK ---
  http: ^1.2.2

  # --- SPEECH TO TEXT ---
  # Uses device-native STT engine — no API key, no third-party server calls.
  # On Android this routes through the system SpeechRecognizer service.
  speech_to_text: ^7.0.0

  # --- TTS (Phase 2) ---
  # flutter_tts: on-device TTS engine. Used as the fallback when no ElevenLabs
  # key is configured. Fully offline, no third-party calls.
  flutter_tts: ^4.0.2

  # audioplayers: plays the MP3 bytes returned by the ElevenLabs API.
  # No analytics, no network calls beyond what we explicitly make.
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/avatars/
    - assets/hazard_icons/
    - assets/sounds/

