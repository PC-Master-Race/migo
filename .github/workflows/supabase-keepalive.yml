# Supabase Keep-Alive
#
# Free-tier Supabase projects PAUSE after 7 days with no activity (data is kept,
# but the project goes offline until manually restored). This workflow makes a
# tiny request to the REST API once a day so the project always looks active and
# never pauses.
#
# SETUP (one time): add two repository secrets under
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#     SUPABASE_URL = https://YOUR-PROJECT.supabase.co
#     SUPABASE_KEY = your publishable (anon) key
# The workflow file itself holds NO secrets, so it's safe in a public repo.

name: Supabase Keep-Alive

on:
  schedule:
    # Daily at 08:37 UTC. (Off-the-hour on purpose — GitHub delays/drops a lot
    # of :00 scheduled runs.) Daily is comfortably under the 7-day pause window.
    - cron: '37 8 * * *'
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Trim any stray whitespace/newlines that sneak in when pasting the
          # secret values (a common cause of "malformed URL" errors).
          URL="$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]')"
          KEY="$(printf '%s' "$SUPABASE_KEY" | tr -d '[:space:]')"

          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_KEY secrets are not set."
            exit 1
          fi

          # A lightweight count query registers DB activity and resets the
          # pause timer. RLS may return 0 rows — that's fine, the request still
          # counts as activity.
          set +e
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${URL}/rest/v1/users?select=count" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}")
          rc=$?
          set -e

          echo "curl exit=$rc, HTTP status=$code"
          if [ "$rc" -ne 0 ]; then
            echo "::error::Request failed (curl exit $rc). The SUPABASE_URL secret is probably malformed — re-save it as exactly https://YOUR-PROJECT.supabase.co with no spaces, quotes, or prefix."
            exit 1
          fi

          # 2xx or 401/403 (RLS) all prove the project is awake; the request
          # itself is what keeps it from pausing.
          case "$code" in
            2*|401|403) echo "Project is active." ;;
            *) echo "::warning::Unexpected status $code (project was still pinged)." ;;
          esac
